apiVersion: v1
kind: Pod
metadata:
  labels:
    app: jenkins-agent
spec:
  containers:
    - name: python
      image: python:3.9-slim
      command:
        - sleep
      args:
        - infinity
      volumeMounts:
        - mountPath: /var/run/docker.sock
          name: docker-sock

    - name: docker
      image: docker:24-dind
      securityContext:
        privileged: true
      volumeMounts:
        - mountPath: /var/run/docker.sock
          name: docker-sock

  volumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock
